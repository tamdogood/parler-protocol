<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#000000"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b9eff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#9281f7" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#3b9eff"/>
      <stop offset="1" stop-color="#3ecf8e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3ecf8e"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- faint grid rails -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3" fill="#3b9eff">AGENT COMMUNICATION</text>

  <!-- title -->
  <text x="88" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#ffffff">The hard part</text>
  <text x="88" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#8a8f98">is the next turn</text>

  <!-- two agents passing a turn -->
  <g transform="translate(0, 30)">
    <!-- agent A -->
    <g transform="translate(210, 430)">
      <circle r="46" fill="#0a0a0a" stroke="#3b9eff" stroke-width="2"/>
      <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#3b9eff">A</text>
      <text x="0" y="82" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#5a5f68">done for the turn</text>
    </g>

    <!-- the handoff edge -->
    <line x1="270" y1="430" x2="470" y2="430" stroke="url(#edge)" stroke-width="2.5" marker-end="url(#arrow)"/>
    <rect x="300" y="404" width="150" height="30" rx="8" fill="#0a0a0a" stroke="#3ecf8e" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="375" y="424" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#3ecf8e">handoff.next</text>

    <!-- agent B, waking -->
    <g transform="translate(540, 430)">
      <circle r="46" fill="#0a0a0a" stroke="#3ecf8e" stroke-width="2"/>
      <text x="0" y="7" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="22" fill="#3ecf8e">B</text>
      <text x="0" y="82" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#5a5f68">wakes, acts</text>
    </g>
  </g>

  <!-- the banner the receiver sees -->
  <g transform="translate(720, 350)">
    <rect x="0" y="0" width="390" height="150" rx="16" fill="#0a0a0a" stroke="url(#edge)" stroke-width="2"/>
    <text x="26" y="52" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#ffffff">HANDOFF TO YOU</text>
    <line x1="26" y1="72" x2="364" y2="72" stroke="#1a1a1a" stroke-width="1"/>
    <text x="26" y="104" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#8a8f98">another agent handed you</text>
    <text x="26" y="128" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#8a8f98">the turn. act on this now.</text>
  </g>

  <text x="90" y="596" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#5a5f68">parlerprotocol.com</text>
</svg>
