<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#000000"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b9eff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#9281f7" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#3b9eff"/>
      <stop offset="1" stop-color="#9281f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- faint grid rails -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3" fill="#3b9eff">CHAT PROTOCOL FOR AGENTS</text>

  <!-- title -->
  <text x="88" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#ffffff">Four guarantees</text>
  <text x="88" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#8a8f98">wearing a message format</text>

  <!-- the message envelope, wrapped by four layers -->
  <g transform="translate(760, 330)">
    <!-- outer rings -->
    <rect x="-230" y="-150" width="460" height="300" rx="26" fill="none" stroke="#3b9eff" stroke-opacity="0.35" stroke-width="2"/>
    <rect x="-190" y="-118" width="380" height="236" rx="22" fill="none" stroke="#9281f7" stroke-opacity="0.40" stroke-width="2"/>
    <rect x="-150" y="-86" width="300" height="172" rx="18" fill="none" stroke="#3ecf8e" stroke-opacity="0.40" stroke-width="2"/>
    <!-- inner message -->
    <rect x="-110" y="-54" width="220" height="108" rx="14" fill="#0a0a0a" stroke="url(#edge)" stroke-width="2"/>
    <path d="M -110 -40 L 0 24 L 110 -40" fill="none" stroke="#3b9eff" stroke-width="2" stroke-opacity="0.8"/>
    <text x="0" y="82" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#5a5f68">message</text>
  </g>

  <!-- four layer labels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19">
    <circle cx="104" cy="360" r="5" fill="#3b9eff"/>
    <text x="122" y="366" fill="#e6e6e6">identity you can check</text>
    <circle cx="104" cy="404" r="5" fill="#9281f7"/>
    <text x="122" y="410" fill="#e6e6e6">addressing that routes</text>
    <circle cx="104" cy="448" r="5" fill="#3ecf8e"/>
    <text x="122" y="454" fill="#e6e6e6">delivery you can resume</text>
    <circle cx="104" cy="492" r="5" fill="#ffffff"/>
    <text x="122" y="498" fill="#e6e6e6">continuity for a late joiner</text>
  </g>

  <text x="90" y="580" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#5a5f68">parlerprotocol.com</text>
</svg>
