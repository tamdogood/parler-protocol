<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none" role="img" aria-label="Two people, each with their own agent, joined into one shared session by a single key.">
  <defs>
    <radialGradient id="glowBlue" cx="18%" cy="-6%" r="70%">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#3b9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="84%" cy="8%" r="62%">
      <stop offset="0%" stop-color="#3ad389" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#3ad389" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="railL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9281f7" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="railR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9281f7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3ad389" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#000000"/>
  <rect width="1280" height="640" fill="url(#glowBlue)"/>
  <rect width="1280" height="640" fill="url(#glowGreen)"/>

  <!-- connecting rails: two people into one session -->
  <path d="M300 320 H575" stroke="url(#railL)" stroke-width="2"/>
  <path d="M705 320 H980" stroke="url(#railR)" stroke-width="2"/>

  <!-- left person + agent -->
  <g>
    <rect x="120" y="238" width="180" height="164" rx="18" fill="#0c0c0c" stroke="#292d30"/>
    <circle cx="210" cy="292" r="24" fill="none" stroke="#3b9eff" stroke-width="2"/>
    <circle cx="210" cy="285" r="9" fill="#3b9eff" fill-opacity="0.9"/>
    <path d="M191 312 q19 -18 38 0" fill="none" stroke="#3b9eff" stroke-width="2" stroke-linecap="round"/>
    <text x="210" y="360" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#a1a4a5">you · claude</text>
    <text x="210" y="382" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6c6c6c">auth flow</text>
  </g>

  <!-- right person + agent -->
  <g>
    <rect x="980" y="238" width="180" height="164" rx="18" fill="#0c0c0c" stroke="#292d30"/>
    <circle cx="1070" cy="292" r="24" fill="none" stroke="#3ad389" stroke-width="2"/>
    <circle cx="1070" cy="285" r="9" fill="#3ad389" fill-opacity="0.9"/>
    <path d="M1051 312 q19 -18 38 0" fill="none" stroke="#3ad389" stroke-width="2" stroke-linecap="round"/>
    <text x="1070" y="360" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#a1a4a5">teammate · codex</text>
    <text x="1070" y="382" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6c6c6c">joined in 1 line</text>
  </g>

  <!-- center: one shared session, keyed -->
  <g>
    <rect x="575" y="250" width="130" height="140" rx="20" fill="#111214" stroke="#3b3f45"/>
    <!-- key glyph -->
    <circle cx="626" cy="300" r="15" fill="none" stroke="#9281f7" stroke-width="3"/>
    <path d="M639 305 L672 305 L672 320 M658 305 L658 318" stroke="#9281f7" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="640" y="352" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f0f0f0">A3KELDJR</text>
    <text x="640" y="374" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6e727a">one session</text>
  </g>

  <!-- title -->
  <text x="140" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#ffffff">One key. One shared session.</text>
  <text x="140" y="166" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" fill="#a1a4a5">Two people, each with their own agent, in the same conversation.</text>

  <!-- approval chip -->
  <g>
    <rect x="562" y="418" width="156" height="34" rx="17" fill="#0c0c0c" stroke="#292d30"/>
    <path d="M584 435 l6 6 l12 -12" stroke="#3ad389" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="614" y="440" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#a1a4a5">host approves</text>
  </g>
</svg>
