<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#000000"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b9eff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#9281f7" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#9281f7"/>
      <stop offset="1" stop-color="#3b9eff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- faint grid rails -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3" fill="#3b9eff">AI AGENT COLLABORATION</text>

  <!-- title -->
  <text x="88" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#ffffff">Orchestration</text>
  <text x="88" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#8a8f98">is not collaboration</text>

  <!-- LEFT: the loop — one process owning sub-agents -->
  <g transform="translate(0, 400)">
    <text x="90" y="-24" font-family="ui-monospace, Menlo, monospace" font-size="16" letter-spacing="1" fill="#5a5f68">the loop &#183; one process</text>
    <rect x="120" y="0" width="330" height="150" rx="18" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="285" y="30" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#5a5f68">for agent in graph:</text>
    <!-- sub-agents the orchestrator owns -->
    <g font-family="ui-monospace, Menlo, monospace" font-size="14">
      <rect x="150" y="52" width="80" height="72" rx="12" fill="#0a0a0a" stroke="#5a5f68" stroke-width="1.5"/>
      <text x="190" y="93" text-anchor="middle" fill="#8a8f98">a()</text>
      <rect x="245" y="52" width="80" height="72" rx="12" fill="#0a0a0a" stroke="#5a5f68" stroke-width="1.5"/>
      <text x="285" y="93" text-anchor="middle" fill="#8a8f98">b()</text>
      <rect x="340" y="52" width="80" height="72" rx="12" fill="#0a0a0a" stroke="#5a5f68" stroke-width="1.5"/>
      <text x="380" y="93" text-anchor="middle" fill="#8a8f98">c()</text>
    </g>
  </g>

  <!-- the boundary -->
  <line x1="600" y1="330" x2="600" y2="600" stroke="#3a3a3a" stroke-width="2" stroke-dasharray="6 8"/>

  <!-- RIGHT: the boundary — independent agents through a hub -->
  <g transform="translate(0, 400)">
    <text x="700" y="-24" font-family="ui-monospace, Menlo, monospace" font-size="16" letter-spacing="1" fill="#5a5f68">the boundary &#183; independent agents</text>

    <!-- agent A -->
    <rect x="680" y="4" width="120" height="64" rx="14" fill="#0a0a0a" stroke="#3b9eff" stroke-width="2"/>
    <text x="740" y="42" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#e6e6e6">agent A</text>

    <!-- agent B -->
    <rect x="680" y="86" width="120" height="64" rx="14" fill="#0a0a0a" stroke="#9281f7" stroke-width="2"/>
    <text x="740" y="124" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#e6e6e6">agent B</text>

    <!-- hub -->
    <rect x="960" y="45" width="130" height="64" rx="14" fill="#0a0a0a" stroke="#3ecf8e" stroke-width="2"/>
    <text x="1025" y="76" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#3ecf8e">hub</text>
    <text x="1025" y="96" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#5a5f68">log + cursor</text>

    <!-- wires across the boundary -->
    <line x1="800" y1="36" x2="960" y2="66" stroke="url(#wire)" stroke-width="2.5"/>
    <line x1="800" y1="118" x2="960" y2="88" stroke="url(#wire)" stroke-width="2.5"/>
  </g>

  <text x="90" y="600" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#5a5f68">parlerprotocol.com</text>
</svg>
