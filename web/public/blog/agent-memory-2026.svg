<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A fleet of agents sharing one memory core: episodic, semantic, and procedural memory in a single store.">
  <defs>
    <radialGradient id="glowBlue" gradientUnits="userSpaceOnUse" cx="600" cy="-40" r="580">
      <stop offset="0" stop-color="#3b9eff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3b9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" gradientUnits="userSpaceOnUse" cx="1060" cy="-10" r="540">
      <stop offset="0" stop-color="#9281f7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#9281f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" gradientUnits="userSpaceOnUse" cx="600" cy="760" r="460">
      <stop offset="0" stop-color="#3ecf8e" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#3ecf8e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreHalo" gradientUnits="userSpaceOnUse" cx="600" cy="337" r="230">
      <stop offset="0" stop-color="#3b9eff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#3b9eff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="675" fill="#000000"/>
  <rect width="1200" height="675" fill="url(#glowBlue)"/>
  <rect width="1200" height="675" fill="url(#glowViolet)"/>
  <rect width="1200" height="675" fill="url(#glowGreen)"/>
  <rect x="0.5" y="0.5" width="1199" height="674" fill="none" stroke="#16191d"/>

  <!-- connectors: every agent shares the one core -->
  <g stroke="#3b9eff" stroke-width="1.25" stroke-opacity="0.28">
    <line x1="196" y1="176" x2="600" y2="337"/>
    <line x1="168" y1="486" x2="600" y2="337"/>
    <line x1="1004" y1="170" x2="600" y2="337"/>
    <line x1="1036" y1="498" x2="600" y2="337"/>
    <line x1="600" y1="596" x2="600" y2="337"/>
  </g>

  <!-- the shared memory core: one SQLite file, three long-term memory types -->
  <rect x="596" y="253" width="8" height="8" fill="none"/>
  <circle cx="600" cy="337" r="220" fill="url(#coreHalo)"/>
  <g>
    <rect x="472" y="256" width="256" height="162" rx="16" fill="#05070a" stroke="#3b9eff" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="486" y="243" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#3b9eff" letter-spacing="0.06em">hub.sqlite</text>

    <!-- episodic -->
    <rect x="490" y="276" width="220" height="30" rx="7" fill="#0b0e12" stroke="#1a1d22"/>
    <rect x="502" y="286" width="10" height="10" rx="2" fill="#3b9eff"/>
    <text x="524" y="295" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14.5" fill="#c9ccce">episodic</text>
    <!-- semantic -->
    <rect x="490" y="322" width="220" height="30" rx="7" fill="#0b0e12" stroke="#1a1d22"/>
    <rect x="502" y="332" width="10" height="10" rx="2" fill="#3ecf8e"/>
    <text x="524" y="341" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14.5" fill="#c9ccce">semantic</text>
    <!-- procedural -->
    <rect x="490" y="368" width="220" height="30" rx="7" fill="#0b0e12" stroke="#1a1d22"/>
    <rect x="502" y="378" width="10" height="10" rx="2" fill="#9281f7"/>
    <text x="524" y="387" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14.5" fill="#c9ccce">procedural</text>
  </g>

  <!-- agent nodes: a fleet, not a single player -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#8b9096">
    <g>
      <circle cx="196" cy="176" r="28" fill="#05070a" stroke="#23262b" stroke-width="1.5"/>
      <circle cx="196" cy="176" r="5" fill="#3b9eff"/>
      <text x="196" y="128" text-anchor="middle">planner</text>
    </g>
    <g>
      <circle cx="168" cy="486" r="28" fill="#05070a" stroke="#23262b" stroke-width="1.5"/>
      <circle cx="168" cy="486" r="5" fill="#3ecf8e"/>
      <text x="168" y="538" text-anchor="middle">reviewer</text>
    </g>
    <g>
      <circle cx="1004" cy="170" r="28" fill="#05070a" stroke="#23262b" stroke-width="1.5"/>
      <circle cx="1004" cy="170" r="5" fill="#9281f7"/>
      <text x="1004" y="122" text-anchor="middle">coder</text>
    </g>
    <g>
      <circle cx="1036" cy="498" r="28" fill="#05070a" stroke="#23262b" stroke-width="1.5"/>
      <circle cx="1036" cy="498" r="5" fill="#3b9eff"/>
      <text x="1036" y="550" text-anchor="middle">researcher</text>
    </g>
    <g>
      <circle cx="600" cy="596" r="28" fill="#05070a" stroke="#23262b" stroke-width="1.5"/>
      <circle cx="600" cy="596" r="5" fill="#3ecf8e"/>
      <text x="600" y="648" text-anchor="middle">webdev</text>
    </g>
  </g>

  <!-- framing labels -->
  <text x="40" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#3b9eff" letter-spacing="0.14em">AGENT MEMORY · 2026</text>
  <text x="1160" y="52" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#5b6168" letter-spacing="0.1em">PARLER</text>
  <text x="600" y="444" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13.5" fill="#6c7176" letter-spacing="0.16em">shared · scoped · signed</text>
</svg>
