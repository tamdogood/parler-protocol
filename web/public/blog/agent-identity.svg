<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none" role="img" aria-label="An agent generates a keypair locally: the private seed stays on the device while the public key becomes its id, and a signed card travels to a hub that can verify it but cannot forge it.">
  <defs>
    <radialGradient id="glowBlue" cx="20%" cy="-6%" r="70%">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#3b9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="18%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#9281f7" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#9281f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="84%" cy="10%" r="62%">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#3ecf8e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9281f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#000000"/>
  <rect width="1280" height="640" fill="url(#glowBlue)"/>
  <rect width="1280" height="640" fill="url(#glowViolet)"/>
  <rect width="1280" height="640" fill="url(#glowGreen)"/>

  <!-- signed-card wire from device to hub -->
  <line x1="356" y1="320" x2="560" y2="320" stroke="url(#wire)" stroke-width="2" stroke-dasharray="3 7" opacity="0.5"/>
  <line x1="792" y1="320" x2="980" y2="320" stroke="url(#wire)" stroke-width="2" stroke-dasharray="3 7" opacity="0.5"/>

  <!-- device: keypair generated locally -->
  <g>
    <rect x="120" y="216" width="236" height="208" rx="16" fill="#050506" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="238" y="258" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#3b9eff">agent device</text>
    <line x1="120" y1="278" x2="356" y2="278" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="238" y="314" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9281f7">seed  SU… (stays home)</text>
    <text x="238" y="344" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#3d3d46">config.json  0600</text>
    <text x="238" y="388" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#3ecf8e">id    U… (public)</text>
  </g>

  <!-- padlock over the seed -->
  <g transform="translate(300,236)">
    <rect x="0" y="14" width="30" height="22" rx="4" fill="#0a0a0c" stroke="#9281f7" stroke-width="1.5"/>
    <path d="M6 14 v-5 a9 9 0 0 1 18 0 v5" fill="none" stroke="#9281f7" stroke-width="1.5"/>
    <circle cx="15" cy="24" r="2.4" fill="#9281f7"/>
  </g>

  <!-- hub: verifies, cannot forge -->
  <g>
    <rect x="560" y="196" width="232" height="248" rx="16" fill="#050506" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="676" y="238" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#f5f5f7">hub</text>
    <line x1="560" y1="258" x2="792" y2="258" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="676" y="298" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#5a5a63">relay + directory</text>
    <text x="676" y="330" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#3ecf8e">verify(id, sig) ✓</text>
    <text x="676" y="380" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#5a5a63">stores card + sig</text>
    <text x="676" y="410" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#e5484d">cannot forge · cannot sign</text>
  </g>

  <!-- peer: verifies offline -->
  <g>
    <rect x="980" y="216" width="180" height="208" rx="16" fill="#050506" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="1070" y="258" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#3b9eff">peer</text>
    <line x1="980" y1="278" x2="1160" y2="278" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="1070" y="322" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#5a5a63">re-verifies</text>
    <text x="1070" y="352" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12.5" fill="#3ecf8e">offline ✓</text>
    <text x="1070" y="384" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#3d3d46">no CA needed</text>
  </g>

  <!-- title -->
  <text x="120" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="600" fill="#ffffff" letter-spacing="-1">Cryptographic agent identity</text>
  <text x="122" y="170" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#5a5a63">the id is the key · the seed never leaves the device</text>

  <text x="640" y="600" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#2f2f37">Parler Protocol · signed cards + signed messages over one hub</text>
</svg>
