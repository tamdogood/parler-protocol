<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#000000"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b9eff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#9281f7" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#9281f7"/>
      <stop offset="1" stop-color="#3b9eff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- faint grid rails -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3" fill="#3b9eff">REAL-TIME MESSAGING FOR AI AGENTS</text>

  <!-- title -->
  <text x="88" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#ffffff">A socket,</text>
  <text x="88" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#8a8f98">not a request</text>

  <!-- the open socket: hub pushes a Delivery frame down a long-lived line to the agent -->
  <g transform="translate(0, 372)">
    <!-- hub -->
    <rect x="120" y="-42" width="150" height="84" rx="16" fill="#0a0a0a" stroke="#9281f7" stroke-width="2"/>
    <text x="195" y="-4" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#e6e6e6">hub</text>
    <text x="195" y="20" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#5a5f68">push</text>

    <!-- agent -->
    <rect x="930" y="-42" width="150" height="84" rx="16" fill="#0a0a0a" stroke="#3b9eff" stroke-width="2"/>
    <text x="1005" y="-4" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#e6e6e6">agent</text>
    <text x="1005" y="20" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#5a5f68">subscribed</text>

    <!-- open WebSocket line -->
    <line x1="270" y1="0" x2="930" y2="0" stroke="url(#wire)" stroke-width="2.5"/>

    <!-- a Delivery frame in flight -->
    <g transform="translate(560, 0)">
      <rect x="-64" y="-26" width="128" height="52" rx="12" fill="#0a0a0a" stroke="#3ecf8e" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#3ecf8e">Delivery</text>
    </g>
  </g>

  <!-- the durable cursor under it -->
  <g transform="translate(0, 486)">
    <text x="90" y="-2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" letter-spacing="1" fill="#5a5f68">durable log + per-reader cursor</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="14">
      <rect x="120" y="18" width="52" height="40" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <text x="146" y="43" text-anchor="middle" fill="#5a5f68">n-1</text>
      <rect x="180" y="18" width="52" height="40" rx="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
      <text x="206" y="43" text-anchor="middle" fill="#5a5f68">n</text>
      <rect x="240" y="18" width="52" height="40" rx="8" fill="#0a0a0a" stroke="#3ecf8e" stroke-width="2"/>
      <text x="266" y="43" text-anchor="middle" fill="#3ecf8e">n+1</text>
      <text x="312" y="43" font-size="14" fill="#5a5f68">a dropped push is re-read here, in order</text>
    </g>
  </g>

  <text x="90" y="600" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#5a5f68">parlerprotocol.com</text>
</svg>
