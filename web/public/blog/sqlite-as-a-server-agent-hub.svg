<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#000000"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b9eff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#9281f7" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- faint grid rails -->
  <g stroke="#1a1a1a" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="120" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3" fill="#3b9eff">SQLITE AS A SERVER</text>

  <!-- title -->
  <text x="88" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#ffffff">One file,</text>
  <text x="88" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="600" fill="#ffffff">the whole backend.</text>

  <!-- subtitle -->
  <text x="90" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" fill="#8a8a8a">one writer · a pool of read-only WAL readers · one .sqlite</text>

  <!-- diagram: one writer + N readers into a single file -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">
    <!-- the single SQLite file -->
    <rect x="820" y="400" width="290" height="150" rx="16" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1.5"/>
    <text x="965" y="452" text-anchor="middle" fill="#ffffff" font-size="22">hub.sqlite</text>
    <text x="965" y="482" text-anchor="middle" fill="#6a6a6a">log · memory · blobs</text>
    <text x="965" y="508" text-anchor="middle" fill="#6a6a6a">directory · tokens</text>

    <!-- writer node -->
    <rect x="120" y="392" width="150" height="46" rx="10" fill="#0a0a0a" stroke="#3b9eff" stroke-width="1.5"/>
    <text x="195" y="421" text-anchor="middle" fill="#3b9eff">1 writer</text>
    <line x1="270" y1="415" x2="820" y2="440" stroke="#3b9eff" stroke-width="2"/>

    <!-- reader nodes -->
    <rect x="120" y="458" width="150" height="40" rx="10" fill="#0a0a0a" stroke="#3ecf8e" stroke-width="1.5"/>
    <text x="195" y="483" text-anchor="middle" fill="#3ecf8e">reader</text>
    <rect x="120" y="510" width="150" height="40" rx="10" fill="#0a0a0a" stroke="#3ecf8e" stroke-width="1.5"/>
    <text x="195" y="535" text-anchor="middle" fill="#3ecf8e">reader</text>
    <rect x="120" y="562" width="150" height="40" rx="10" fill="#0a0a0a" stroke="#3ecf8e" stroke-width="1.5"/>
    <text x="195" y="587" text-anchor="middle" fill="#3ecf8e">reader · N</text>
    <g stroke="#3ecf8e" stroke-width="1.5" stroke-opacity="0.7">
      <line x1="270" y1="478" x2="820" y2="470"/>
      <line x1="270" y1="530" x2="820" y2="490"/>
      <line x1="270" y1="582" x2="820" y2="510"/>
    </g>
  </g>
</svg>
