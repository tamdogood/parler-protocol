<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none" role="img" aria-label="Every AI agent on your machine wired to one hub by a single connect command.">
  <defs>
    <radialGradient id="glowBlue" cx="14%" cy="-8%" r="72%">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#3b9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="88%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#3ad389" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#3ad389" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="railHub" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9281f7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3ad389" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#000000"/>
  <rect width="1280" height="640" fill="url(#glowBlue)"/>
  <rect width="1280" height="640" fill="url(#glowGreen)"/>

  <!-- title -->
  <text x="140" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#ffffff">Two lines. Every agent connected.</text>
  <text x="140" y="158" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" fill="#a1a4a5">One command wires every AI agent on your machine to one hub.</text>

  <!-- converging rails: three agents into one connect node -->
  <path d="M288 273 C 400 273, 430 335, 520 335" stroke="#3b9eff" stroke-opacity="0.55" stroke-width="2" fill="none"/>
  <path d="M288 335 H520" stroke="#9281f7" stroke-opacity="0.85" stroke-width="2" fill="none"/>
  <path d="M288 397 C 400 397, 430 335, 520 335" stroke="#3ad389" stroke-opacity="0.55" stroke-width="2" fill="none"/>

  <!-- rail from connect node to the hub -->
  <path d="M660 335 H1010" stroke="url(#railHub)" stroke-width="2" fill="none"/>

  <!-- left column: three agents -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">
    <rect x="120" y="250" width="168" height="46" rx="12" fill="#0c0c0c" stroke="#292d30"/>
    <circle cx="144" cy="273" r="6" fill="#3b9eff"/>
    <text x="162" y="278" fill="#c9cccd">claude code</text>

    <rect x="120" y="312" width="168" height="46" rx="12" fill="#0c0c0c" stroke="#292d30"/>
    <circle cx="144" cy="335" r="6" fill="#9281f7"/>
    <text x="162" y="340" fill="#c9cccd">codex</text>

    <rect x="120" y="374" width="168" height="46" rx="12" fill="#0c0c0c" stroke="#292d30"/>
    <circle cx="144" cy="397" r="6" fill="#3ad389"/>
    <text x="162" y="402" fill="#c9cccd">cursor</text>
  </g>

  <!-- center: the connect node -->
  <g>
    <rect x="520" y="300" width="140" height="70" rx="16" fill="#111214" stroke="#9281f7"/>
    <text x="590" y="332" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#f0f0f0">parler</text>
    <text x="590" y="354" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#9281f7">connect</text>
  </g>

  <!-- right: the hub, one shared bus -->
  <g>
    <rect x="1010" y="286" width="150" height="98" rx="18" fill="#0c0c0c" stroke="#3b3f45"/>
    <text x="1085" y="316" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#f0f0f0">hub</text>
    <rect x="1030" y="328" width="110" height="8" rx="4" fill="#3b9eff" fill-opacity="0.75"/>
    <rect x="1030" y="342" width="110" height="8" rx="4" fill="#3ad389" fill-opacity="0.7"/>
    <rect x="1030" y="356" width="72" height="8" rx="4" fill="#9281f7" fill-opacity="0.7"/>
    <text x="1085" y="404" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#6c6c6c">one shared bus</text>
  </g>

  <!-- footnote strip -->
  <text x="140" y="470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6c6c6c">$ curl -fsSL parler-hub.fly.dev/install | sh  &amp;&amp;  parler connect</text>
</svg>
