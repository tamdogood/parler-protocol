<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none" role="img" aria-label="One agent pushes a git bundle as a content-addressed blob across the hub to a second agent, which applies it into a side ref.">
  <defs>
    <radialGradient id="glowBlue" cx="22%" cy="-8%" r="70%">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#3b9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="82%" cy="8%" r="62%">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#3ecf8e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="railFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b9eff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9281f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#000000"/>
  <rect width="1280" height="640" fill="url(#glowBlue)"/>
  <rect width="1280" height="640" fill="url(#glowGreen)"/>

  <!-- transport wire -->
  <line x1="300" y1="250" x2="980" y2="250" stroke="url(#wire)" stroke-width="2" stroke-dasharray="3 7" opacity="0.5"/>

  <!-- sender agent -->
  <g>
    <rect x="120" y="176" width="196" height="148" rx="16" fill="#050506" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="218" y="228" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#3b9eff">alice</text>
    <text x="218" y="256" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#5a5a63">parler push</text>
    <text x="218" y="292" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#3d3d46">git bundle create</text>
  </g>

  <!-- hub -->
  <g>
    <rect x="524" y="152" width="232" height="196" rx="16" fill="#050506" stroke="#1c1c22" stroke-width="1.5"/>
    <line x1="524" y1="196" x2="756" y2="196" stroke="#1c1c22" stroke-width="1.5"/>
    <circle cx="552" cy="174" r="5" fill="#26262e"/>
    <circle cx="570" cy="174" r="5" fill="#26262e"/>
    <circle cx="588" cy="174" r="5" fill="#26262e"/>
    <text x="740" y="180" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#9281f7">parler-hub</text>
    <text x="640" y="238" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a1a4a5">blob store</text>
    <text x="640" y="272" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#3ecf8e">id = sha256(bytes)</text>
    <text x="640" y="308" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#3d3d46">member-gated, never run</text>
  </g>

  <!-- receiver agent -->
  <g>
    <rect x="964" y="176" width="196" height="148" rx="16" fill="#050506" stroke="#1c1c22" stroke-width="1.5"/>
    <text x="1062" y="228" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#3ecf8e">bob</text>
    <text x="1062" y="256" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#5a5a63">parler apply</text>
    <text x="1062" y="292" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#3d3d46">refs/parler/&#8230;</text>
  </g>

  <!-- moving bundle -->
  <g>
    <rect x="608" y="392" width="64" height="52" rx="10" fill="#0a0a0c" stroke="#3b9eff" stroke-width="1.5"/>
    <text x="640" y="424" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24">&#128230;</text>
    <text x="640" y="474" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#8a8a93">com.parler.bundle</text>
  </g>

  <!-- bottom rail -->
  <rect x="120" y="536" width="1040" height="3" rx="1.5" fill="url(#railFade)"/>
  <text x="120" y="580" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" fill="#a1a4a5">Move the change itself, not a description of it &#183; Parler Protocol, in one Rust binary</text>
</svg>
