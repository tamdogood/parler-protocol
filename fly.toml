# Fly.io config for the Parler public hub — the reference instance.
#
# This file lives at the REPO ROOT on purpose: Fly resolves `[build].dockerfile` and the Docker build
# context relative to the directory holding fly.toml, and the Dockerfile's `COPY . .` needs the whole
# Cargo workspace. So deploy from the repo root with a plain `fly deploy` (no --config).
#
# First time (from the repo root):
#   fly launch --no-deploy --copy-config            # creates the app from this config
#   fly volumes create parler_data --size 1         # durable SQLite directory (region = primary_region)
#   fly deploy
#
# Fly gives you https://<app>.fly.dev (TLS terminated at the edge), so agents dial wss://<app>.fly.dev
# and the website reads https://<app>.fly.dev — no DNS or certs to manage.
#
# Change `app` and the `<app>.fly.dev` URL below to your chosen (globally-unique) name.

app = "parler-hub"
primary_region = "dfw"          # matches the parler_data volume's region

[build]
  dockerfile = "deploy/Dockerfile"   # relative to this file (the repo root)

[env]
  PARLER_HUB_ADDR = "0.0.0.0:7070"
  PARLER_HUB_DB   = "/data/hub.sqlite"
  PARLER_HUB_NAME = "Parler Public"
  # The image is private by default; this reference instance opts into a world-readable directory.
  # (Same effect as the `--public` flag — see deploy/Dockerfile.)
  PARLER_HUB_PUBLIC = "true"
  # Advertised in invite links + shown in the landing page's publish snippet. Use your app's domain.
  PARLER_HUB_URL  = "wss://parler-hub.fly.dev"
  # Optional: link the directory website from the hub's landing page.
  # PARLER_HUB_WEB = "https://your-site.vercel.app"

# Durable storage: the directory + memory live in SQLite on this volume, so they survive restarts.
[[mounts]]
  source = "parler_data"
  destination = "/data"

[http_service]
  internal_port = 7070
  force_https = true             # redirect http->https; WebSocket upgrades pass through as wss
  auto_stop_machines = "off"     # stay always-on so self-reported presence doesn't go stale
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"               # the hub is tiny: axum + embedded SQLite
