appId: com.parler.desktop
productName: Parler
copyright: Copyright © 2026 Tam Nguyen (tamdogood)

directories:
  buildResources: build
  output: release

# Everything under resources/ ships alongside the app and lands in Contents/Resources at runtime:
#   bin/parler, bin/parler-hub  → spawned by the main process (built by scripts/build-binaries.sh)
#   trayTemplate*.png           → the menu-bar icon (generated by scripts/gen-icons.mjs)
extraResources:
  - from: resources
    to: .
    filter: ["**/*"]

files:
  - "out/**/*"
  - "!**/*.map"

asar: true

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
  # Unsigned for now (no Apple Developer ID yet). Gatekeeper will quarantine the download; users
  # right-click → Open once, or run `xattr -dr com.apple.quarantine /Applications/Parler.app`.
  # To sign later: set identity + CSC_LINK/CSC_KEY_PASSWORD and flip notarize on.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  darkModeSupport: true
  extendInfo:
    LSApplicationCategoryType: public.app-category.developer-tools

dmg:
  title: "${productName} ${version}"
  # Standard drag-to-Applications layout.
  contents:
    - x: 140
      y: 200
      type: file
    - x: 400
      y: 200
      type: link
      path: /Applications
