# cargo-deny — the supply-chain gate. Run it with `make audit` (or scripts/ci/audit.sh); CI runs the
# same script. Docs: https://embarkstudios.github.io/cargo-deny/
#
# The audit script decides severity: vulnerabilities + unknown sources BLOCK, license problems block
# only when CI_LICENSES_STRICT=1, and unmaintained/yanked/duplicate are warnings. This file is the
# policy those checks read.

[graph]
all-features = true

[advisories]
# RustSec advisory DB. Vulnerabilities fail the audit; `yanked` is a warning (a crate can be yanked
# for reasons unrelated to your build). Add advisory IDs here to consciously waive a finding.
yanked = "warn"
ignore = []

[licenses]
# Permissive allow-list covering the tokio / axum / rusqlite / clap / rustls dependency tree. Parler Protocol
# is Apache-2.0 and attribution matters, so a license outside this set is a real finding to triage.
confidence-threshold = 0.9
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "CDLA-Permissive-2.0", # webpki-roots (the bundled Mozilla CA set) — a permissive data license
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "MPL-2.0",
  "BSL-1.0",
]

[bans]
# A Rust tree always has a few duplicated transitive versions; surface them but don't fail on them.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io and explicitly-listed git remotes are allowed — a dep pulled from anywhere else is a
# supply-chain red flag and fails the audit.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
