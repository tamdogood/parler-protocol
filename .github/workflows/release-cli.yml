name: Release CLI

# Build the prebuilt `parler` binary for each OS/arch and publish it to a GitHub Release, so the
# whole install is `curl -fsSL …/install.sh | sh` (or Homebrew) — no Rust toolchain, no compile.
#
# Triggers: a version tag (`vX.Y.Z`) cuts a release; `workflow_dispatch` dry-runs the build (uploads
# workflow artifacts but publishes to the Release only on a tag push).
#
# Fork-safe: publishing uses the automatic `GITHUB_TOKEN` (contents: write), so a fork releases to its
# own repo with zero setup. `install.sh` pulls from `/releases/latest/download/parler-<target>.tar.gz`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why build manually? (recorded in the run; will not publish a Release)"
        required: false

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust (stable + ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Check tag matches Cargo version
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          tag_version="${tag_version#.}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error title=Version mismatch::tag $GITHUB_REF_NAME expects Cargo version $tag_version, but Cargo.toml says $cargo_version"
            exit 1
          fi

      - name: Cache cargo build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.target }}

      - name: Build parler (release)
        run: cargo build -p parler-bin --release --locked --target ${{ matrix.target }}

      - name: Package + checksum
        run: |
          dist="parler-${{ matrix.target }}"
          tar -C "target/${{ matrix.target }}/release" -czf "$dist.tar.gz" parler
          shasum -a 256 "$dist.tar.gz" | tee "$dist.tar.gz.sha256"
          ls -lh "$dist.tar.gz"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: parler-${{ matrix.target }}
          path: parler-${{ matrix.target }}.tar.gz*
          if-no-files-found: error

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: parler-${{ matrix.target }}.tar.gz

      - name: Publish to the Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: parler-${{ matrix.target }}.tar.gz*
