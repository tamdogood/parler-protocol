name: Release image

# Publish the hub as a prebuilt container image to GitHub Container Registry (GHCR) so running a
# private hub is `docker run ghcr.io/<owner>/parler-hub` in seconds — no local Rust compile.
#
# Triggers: a version tag (`vX.Y.Z`) cuts a released image; `workflow_dispatch` publishes `:latest`
# on demand (handy for the very first image). We deliberately do NOT build on every push to main —
# the multi-arch build is slow, and `:latest`/release tags are the only images anyone should pull.
#
# Fork-safe: the image is pushed to the RUNNER's own namespace (`ghcr.io/${{ github.repository_owner }}`)
# using the automatic `GITHUB_TOKEN`, so a fork publishes to its own packages with zero setup and never
# needs write access to the canonical repo. No registry secrets to configure.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why publish manually? (recorded in the run)"
        required: false

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  image:
    name: Build + push multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check tag matches Cargo version
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          tag_version="${tag_version#.}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error title=Version mismatch::tag $GITHUB_REF_NAME expects Cargo version $tag_version, but Cargo.toml says $cargo_version"
            exit 1
          fi

      # GHCR paths must be lowercase; the owner login usually is, but normalize so forks with any
      # casing still get a valid image reference.
      - name: Resolve image name
        run: echo "IMAGE=ghcr.io/${OWNER,,}/parler-hub" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=parler-hub
            org.opencontainers.image.description=Parler Protocol hub — the lightweight bus for agent-to-agent messaging

      # Same Dockerfile + context as the Fly/Compose builds; just built for both common server arches.
      # arm64 is emulated under QEMU (slow on a cold cache), so the first publish can take a while.
      - name: Build + push
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "### Published \`${IMAGE}\`"
            echo ""
            echo "Run a private hub from it:"
            echo '```bash'
            echo "docker run -d --name parler-hub -p 7070:7070 -v parler_data:/data \\"
            echo "  -e PARLER_HUB_JOIN_SECRET_FILE=/data/join-secret ${IMAGE}"
            echo "docker logs parler-hub   # copy the connect line"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
