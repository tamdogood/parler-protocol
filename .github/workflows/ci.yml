name: CI

# Every gate here is a thin wrapper around a script in scripts/ci/, so `make ci` reproduces this
# pipeline exactly on a contributor's machine. Runs on PRs and pushes to main.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR — fast feedback, no wasted queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the checkout.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # The test system testing itself: selftest (bash -n + lib.sh unit tests + config sanity),
  # shellcheck on the CI scripts, and actionlint on these very workflows.
  pipeline:
    name: Pipeline · selftest · shellcheck · actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Selftest (test the test system)
        run: ./scripts/ci/selftest.sh
      - name: ShellCheck the CI scripts
        # severity=warning fails on real bugs (bad quoting, unchecked cd, …) but not style nits.
        run: shellcheck -x --severity=warning scripts/ci/*.sh
      - name: actionlint (lint the workflows)
        uses: reviewdog/action-actionlint@e0207a28405ecad11953ba625a95d92f7889572a # v1
        with:
          reporter: local # no checks/PR-write permissions needed; fails the step on findings
          filter_mode: nofilter # lint every workflow line; push-to-main has no diff base
          fail_level: error

  rust:
    name: Rust · build · clippy · test · doc · smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy
      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Build · clippy · test · doc
        run: ./scripts/ci/rust.sh
      # Prove the *real* compiled binary boots and serves the HTTP contract (reuses the artifact
      # rust.sh just built, so it's near-instant). The in-process twin runs inside `cargo test`.
      - name: Smoke the real binary
        run: ./scripts/ci/smoke.sh --boot

  supply-chain:
    name: Supply chain · cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny
      - name: Audit dependencies (vulnerabilities + sources block)
        run: ./scripts/ci/audit.sh

  dockerfile:
    name: Deploy · Dockerfile lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Catches genuinely-broken Dockerfiles before the (slow) real build in deploy.yml. Only
      # error-level findings fail, so it never flaps the pipeline on style nits.
      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: deploy/Dockerfile
          failure-threshold: error

  desktop:
    name: Desktop · typecheck · test · build · audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Verify desktop
        run: ./scripts/ci/desktop.sh

  # One check to rule them all: branch protection requires just "CI passed", and this fails if any
  # gate above failed or was cancelled. Adding a gate never means reconfiguring branch protection.
  ci-passed:
    name: CI passed
    if: always()
    needs: [pipeline, rust, supply-chain, dockerfile, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all gates succeeded
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "gate results: ${results}"
          case "${results}" in
            *failure*|*cancelled*) echo "::error::a required gate failed"; exit 1 ;;
            *) echo "all gates green" ;;
          esac
