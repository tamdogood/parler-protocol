name: Security audit

# A daily supply-chain scan independent of PR traffic — a CVE published against an already-merged
# dependency gets caught here even when nobody is pushing. Same script as the CI gate, so the rules
# never drift. Failures notify the maintainer (and can be wired to issues if desired).
on:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo-deny (scheduled)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny
      - name: Audit dependencies
        run: ./scripts/ci/audit.sh
