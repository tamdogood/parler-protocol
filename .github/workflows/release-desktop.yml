name: Release desktop

# Build the macOS desktop app (Parler.app) and publish the DMG to a GitHub Release so the website's
# "Download for macOS" CTA (github.com/<owner>/parler-ai/releases/latest) resolves to a real file.
#
# Triggers: a version tag (`vX.Y.Z`) cuts a release; `workflow_dispatch` lets us dry-run the build
# without publishing (publishes only when the run was tag-triggered).
#
# The build runs on macos-latest (Apple Silicon). electron-builder.yml is configured for arm64 only,
# matching every Mac Apple has shipped since late 2020. The app is unsigned — Gatekeeper will
# quarantine it; the release notes tell users to right-click → Open on first launch.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why build manually? (recorded in the run; will not publish a Release)"
        required: false

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  macos:
    name: Build + publish macOS DMG
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust (stable + aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: aarch64-apple-darwin

      - name: Check tag matches package versions
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          tag_version="${tag_version#.}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          desktop_version="$(node -p 'require("./desktop/package.json").version')"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error title=Version mismatch::tag $GITHUB_REF_NAME expects Cargo version $tag_version, but Cargo.toml says $cargo_version"
            exit 1
          fi
          if [ "$tag_version" != "$desktop_version" ]; then
            echo "::error title=Version mismatch::tag $GITHUB_REF_NAME expects desktop version $tag_version, but desktop/package.json says $desktop_version"
            exit 1
          fi

      - name: Cache cargo build
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: ". -> target"

      - name: Set up Node 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop deps
        working-directory: desktop
        run: |
          npm ci
          npm audit --audit-level=low

      - name: Build Rust binaries (arm64)
        working-directory: desktop
        run: bash scripts/build-binaries.sh aarch64-apple-darwin

      - name: Build renderer + main
        working-directory: desktop
        run: npm run build

      - name: Package with electron-builder
        working-directory: desktop
        env:
          # electron-builder publishes to GitHub Releases when the tag matches vX.Y.Z; using the
          # workspace token so no PAT is required and forks build cleanly with `--publish never`.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            npx electron-builder --mac --publish always
          else
            npx electron-builder --mac --publish never
          fi

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: parler-macos-arm64-dmg
          path: desktop/release/*.dmg
          if-no-files-found: error

      - name: Attest DMG provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: desktop/release/*.dmg

      - name: Summary
        run: |
          {
            echo "### macOS build"
            echo ""
            ls -lh desktop/release/*.dmg || true
          } >> "$GITHUB_STEP_SUMMARY"
