# Dependabot — keep dependencies patched so the supply-chain gate (deny.toml) stays green over time.
# Minor/patch bumps are grouped into one PR per ecosystem to keep the contributor noise low; majors
# come as their own PRs so they get a real review.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      cargo-minor:
        update-types: ["minor", "patch"]

  # Pin and patch the actions used by the workflows themselves.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
